spring.application.name=controlpanel

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/macabi_db
spring.datasource.username=postgres
spring.datasource.password=GonzaloHernan9
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# JWT Configuration
# Secret must be at least 32 characters (256 bits). CHANGE THIS IN PRODUCTION.
# Generate a secure key with: openssl rand -base64 32
jwt.secret=macabi-controlpanel-super-secret-jwt-key-2026-changeme-production
jwt.expiration-ms=86400000

